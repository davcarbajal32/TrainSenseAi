<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrainSense AI</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    margin-top: 20px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
    box-sizing: border-box;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}

h2, h3 {
    margin-bottom: 10px;
}

#result {
    font-size: 22px;
    font-weight: bold;
    margin-top: 15px;
}

.status-msg {
    background: #334155;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
    text-align: center;
}
</style>

</head>

<body onload="clearFields()">

<div class="container">

<h2>Hello!!! Welcome to TrainSense AI</h2>

<!-- LOGIN -->
<div id="auth" class="card">
    <h3>Login or Create Account</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
    <p id="authMsg"></p>
</div>

<!-- DASHBOARD MENU -->
<div id="menu" style="display:none;">
    <div class="card">
        <h3>Dashboard</h3>
        <button onclick="showViz()">View Insights</button>
        <button onclick="showRecommendation()">Workout Recommendation</button>
        <button onclick="showSimulation()">Plan Ahead</button>
    </div>
</div>

<!-- YESTERDAY'S DATA INPUT -->
<div id="inputSection" style="display:none;">
    <div class="card">
        <h3>Enter Yesterday's Data</h3>
        <p style="color:#94a3b8;">We need your info from yesterday to generate today's workout recommendation.</p>

        <input id="sleep" placeholder="Sleep (hours)" type="number" step="0.1">
        <input id="quality" placeholder="Sleep Quality (1-10)" type="number" step="1" min="1" max="10">
        <input id="steps" placeholder="Steps" type="number">
        <input id="calories" placeholder="Calories Burned" type="number">
        <input id="hr" placeholder="Resting Heart Rate" type="number">
        <input id="intensity" placeholder="Workout Intensity (0-10)" type="number" step="0.1">
        <input id="fatigue" placeholder="Fatigue Level (0-100)" type="number" min="0" max="100">

        <button onclick="predict()">Submit & Get Today's Recommendation</button>
    </div>
</div>

<!-- VISUALIZATION -->
<div id="vizSection" style="display:none;">
    <div class="card">
        <h3>Weekly Insights</h3>
        <div id="vizImages"></div>
    </div>
</div>

<!-- RECOMMENDATION -->
<div id="recommendSection" style="display:none;">
    <div class="card">
        <h3>Today's Recommendation</h3>
        <div id="result"></div>
        <ul id="explanation"></ul>
    </div>
</div>

<!-- SIMULATION -->
<div id="simulationSection" style="display:none;">
    <div class="card">
        <h3>What If Simulation</h3>
        <input id="sim_sleep" placeholder="Sleep" type="number" step="0.1">
        <input id="sim_steps" placeholder="Steps" type="number">
        <button onclick="simulate()">Simulate</button>
        <p id="simResult"></p>
    </div>
</div>

</div>

<script>

let currentUser = "";

function clearFields() {
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
}

function hideAll() {
    document.getElementById("inputSection").style.display = "none";
    document.getElementById("vizSection").style.display = "none";
    document.getElementById("recommendSection").style.display = "none";
    document.getElementById("simulationSection").style.display = "none";
}

function showViz() {
    hideAll();
    document.getElementById("vizSection").style.display = "block";
    loadChart();
}

function showRecommendation() {
    hideAll();
    document.getElementById("recommendSection").style.display = "block";
}

function showSimulation() {
    hideAll();
    document.getElementById("simulationSection").style.display = "block";
}

function displayRecommendation(prediction, explanation) {
    document.getElementById("result").innerText =
        "Recommendation: " + prediction;

    const explanationList = document.getElementById("explanation");
    explanationList.innerHTML = "";

    explanation.forEach(exp => {
        const li = document.createElement("li");
        li.innerText = exp;
        explanationList.appendChild(li);
    });
}

async function signup() {
    const res = await fetch("/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();
    document.getElementById("authMsg").innerText = data.message;
}

async function login() {
    const email = document.getElementById("email").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.message === "Login successful") {
        currentUser = email;
        document.getElementById("auth").style.display = "none";
        document.getElementById("menu").style.display = "block";

        // Check if we need yesterday's data or already have a prediction
        await checkYesterdayAndLoad();
    } else {
        document.getElementById("authMsg").innerText = data.message;
    }
}

async function checkYesterdayAndLoad() {
    const res = await fetch("/check_yesterday", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: currentUser })
    });

    const data = await res.json();

    if (data.has_today_prediction && data.today_prediction) {
        // Already have today's prediction — show it directly
        hideAll();
        document.getElementById("recommendSection").style.display = "block";
        displayRecommendation(
            data.today_prediction.prediction,
            data.today_prediction.explanation
        );

    } else if (data.needs_input) {
        // No yesterday data yet — ask the user to fill it in
        hideAll();
        document.getElementById("inputSection").style.display = "block";

    } else {
        // Yesterday's data exists but no prediction for today yet
        // Auto-generate prediction from yesterday's data
        const predRes = await fetch("/auto_predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email: currentUser })
        });

        const predData = await predRes.json();

        if (predData.prediction) {
            hideAll();
            document.getElementById("recommendSection").style.display = "block";
            displayRecommendation(predData.prediction, predData.explanation);
        } else {
            // Fallback: ask for input
            hideAll();
            document.getElementById("inputSection").style.display = "block";
        }
    }
}

async function predict() {
    const data = {
        email: currentUser,
        noisy_sleep_hours: parseFloat(document.getElementById("sleep").value) || 0,
        sleep_quality: parseFloat(document.getElementById("quality").value) || 0,
        TotalSteps: parseFloat(document.getElementById("steps").value) || 0,
        TotalCalories: parseFloat(document.getElementById("calories").value) || 0,
        heart_rate: parseFloat(document.getElementById("hr").value) || 0,
        intensity: parseFloat(document.getElementById("intensity").value) || 0,
        fatigue: parseFloat(document.getElementById("fatigue").value) || 0
    };

    const res = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    hideAll();
    document.getElementById("recommendSection").style.display = "block";
    displayRecommendation(result.prediction, result.explanation);
}

async function loadChart() {
    const res = await fetch("/visualization", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: currentUser })
    });

    const data = await res.json();

    const container = document.getElementById("vizImages");
    container.innerHTML = "";

    data.images.forEach(img => {
        const image = document.createElement("img");
        image.src = "data:image/png;base64," + img;
        image.style.width = "100%";
        image.style.marginTop = "20px";
        container.appendChild(image);
    });
}

async function simulate() {
    const data = {
        email: currentUser,
        noisy_sleep_hours: parseFloat(document.getElementById("sim_sleep").value),
        sleep_quality: 7,
        TotalSteps: parseFloat(document.getElementById("sim_steps").value),
        TotalCalories: 300,
        heart_rate: 70,
        intensity: 1.5,
        fatigue: 30
    };

    const res = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();
    document.getElementById("simResult").innerText =
        "Prediction: " + result.prediction;
}

</script>

</body>
</html>
